<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Sprite Studio v1.18.0 Rule-Based SD</title><style>
:root{color-scheme:dark}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#111;color:#eee}.wrap{max-width:760px;margin:auto;padding:14px}.card{background:#1d1d1f;border:1px solid #333;border-radius:14px;padding:12px;margin:10px 0}h1{font-size:20px;margin:4px 0 12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.preview{background:#ddd;border-radius:10px;padding:6px;text-align:center;color:#111}.preview canvas{width:100%;image-rendering:pixelated;background:repeating-conic-gradient(#eee 0 25%,#ccc 0 50%) 50%/16px 16px}.controls{display:grid;grid-template-columns:1fr 72px;gap:8px;align-items:center}.controls input[type=range]{width:100%}button,.file{display:block;width:100%;box-sizing:border-box;padding:13px;border:0;border-radius:12px;background:#3478f6;color:white;font-weight:700;text-align:center;margin:8px 0}input[type=file]{display:none}.note{font-size:12px;color:#bbb;line-height:1.5}.stage{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stage canvas{width:100%;background:#fff;border-radius:8px}</style></head><body><div class="wrap"><h1>Sprite Studio v1.18.0 — AI不使用 SD変形</h1><label class="file">画像を選ぶ<input id="file" type="file" accept="image/*"></label><div class="card"><div class="controls">
<label>頭幅</label><output id="headXo">1.18</output><input id="headX" type="range" min="1" max="1.35" step="0.01" value="1.18"><span></span>
<label>胴の縦圧縮</label><output id="torsoYo">0.72</output><input id="torsoY" type="range" min="0.55" max="1" step="0.01" value="0.72"><span></span>
<label>脚の縦圧縮</label><output id="legYo">0.55</output><input id="legY" type="range" min="0.4" max="1" step="0.01" value="0.55"><span></span>
</div><button id="run">ルールベースで処理</button><div class="note">背景境界の連結除去 → 連続座標ワープ → Premultiplied Alpha補間 → 輪郭清掃 → 減色。部位を切断しないため、首・腰・膝の継ぎ目ノイズを抑えます。</div></div>
<div class="grid"><div class="preview">128×128<canvas id="c128" width="128" height="128"></canvas><button data-save="c128">PNG保存</button></div><div class="preview">64×64<canvas id="c64" width="64" height="64"></canvas><button data-save="c64">PNG保存</button></div><div class="preview">32×32<canvas id="c32" width="32" height="32"></canvas><button data-save="c32">PNG保存</button></div></div>
<div class="card stage"><div>背景除去<canvas id="cut" width="512" height="512"></canvas></div><div>連続変形<canvas id="warp" width="512" height="512"></canvas></div></div></div>
<script src="js/rule_based_sd_v1180.js"></script><script>
let img=new Image();const $=s=>document.getElementById(s);function paint(dst,src){const c=$(dst),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);x.imageSmoothingEnabled=false;x.drawImage(src,0,0,c.width,c.height)}function run(){if(!img.complete||!img.naturalWidth)return;const r=RuleBasedSD.process(img,{headX:+$('headX').value,torsoY:+$('torsoY').value,legY:+$('legY').value,colors:48});paint('c128',r.c128);paint('c64',r.c64);paint('c32',r.c32);paint('cut',r.cut);paint('warp',r.warped);window.__result=r}['headX','torsoY','legY'].forEach(k=>$(k).oninput=()=>{$(k+'o').textContent=$(k).value});$('run').onclick=run;$('file').onchange=e=>{const f=e.target.files[0];if(!f)return;img.onload=run;img.src=URL.createObjectURL(f)};document.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>{const c=$(b.dataset.save),a=document.createElement('a');a.download=b.dataset.save+'.png';a.href=c.toDataURL('image/png');a.click()});img.onload=run;img.src='assets/sample_input.JPG';
</script></body></html>
